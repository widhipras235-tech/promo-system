<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ff2d2d">

<title>Promo Matahari</title>

<style>
body { font-family: sans-serif; margin: 0; }

header { padding: 10px; background: #ff2d2d; color: white; }
.search-box { display: flex; gap: 5px; }
input { flex: 1; padding: 8px; }

#status { padding: 10px; }
#result { padding: 10px; }

.camera {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: 999;
}
.camera.active { display: block; }

#btnCamera, #btnCapture {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  border: none;
  border-radius: 50%;
  color: white;
  z-index: 1001;
}

#btnCamera {
  bottom: 20px;
  width: 70px;
  height: 70px;
  background: #ff2d2d;
  font-size: 28px;
}

#btnCapture {
  bottom: 100px;
  width: 60px;
  height: 60px;
  background: #00cc88;
  font-size: 22px;
  display: none;
}

#btnClose {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1001;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 8px;
  display: none;
}
</style>

</head>

<body>

<header>
  <h2>Capeex</h2>
  <div class="search-box">
    <input id="search" placeholder="Cari SKU">
  </div>
</header>

<div id="status">Ready</div>
<div id="result"></div>

<button id="btnCamera">📷</button>
<button id="btnCapture">📸</button>
<button id="btnClose">✕</button>

<video id="camera" autoplay playsinline class="camera"></video>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="app.js" defer></script>

</body>
</html>
