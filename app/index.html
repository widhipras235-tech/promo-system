<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ff2d2d">

<title>Promo Matahari</title>

<link rel="stylesheet" href="style.css">

<style>

/* =========================
CAMERA OVERLAY
========================= */
.camera {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
  z-index: 999;
}

.camera.active {
  display: block;
}

/* BACKDROP */
body.camera-open::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 998;
}

/* =========================
SCAN FRAME (KOTAK)
========================= */
.scan-frame {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  
  width: 80%;
  max-width: 320px;
  height: 140px;

  border: 2px solid #00ffcc;
  border-radius: 12px;

  box-shadow: 0 0 20px rgba(0,255,200,0.5);

  z-index: 1000;
  display: none;
}

.scan-frame.active {
  display: block;
}

/* ANIMASI GARIS SCAN */
.scan-line {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;
  background: #00ffcc;

  animation: scanMove 2s linear infinite;
}

@keyframes scanMove {
  0% { top: 0; }
  100% { top: 100%; }
}

/* TEXT INFO */
.scan-text {
  position: fixed;
  top: calc(50% + 100px);
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 14px;
  z-index: 1000;
  display: none;
}

.scan-text.active {
  display: block;
}

/* =========================
BUTTON CAMERA
========================= */
#btnCamera {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: none;

  background: #ff2d2d;
  color: white;
  font-size: 28px;

  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 1001;
}

/* CLOSE BUTTON */
.btn-close {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1001;
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  font-size: 18px;
  padding: 8px 12px;
  border-radius: 8px;
  display: none;
}

.btn-close.active {
  display: block;
}

</style>

</head>

<body>

<header class="header">

<div class="logo">
<h1>Capeex</h1>
<p>Cek Promo • Scan SKU • Online</p>
</div>

<div class="search-box">

<input id="search" placeholder="Cari SKU, artikel, deskripsi, brand">
<button class="search-btn">🔍</button>

</div>

</header>

<main>
<div id="status">Loading...</div>
<div id="result"></div>
</main>

<!-- BUTTON CAMERA -->
<button id="btnCamera">📷</button>

<!-- CLOSE -->
<button id="btnClose" class="btn-close">✕</button>

<!-- CAMERA -->
<video id="camera" autoplay playsinline class="camera"></video>

<!-- SCAN FRAME -->
<div id="scanFrame" class="scan-frame">
  <div class="scan-line"></div>
</div>

<div id="scanText" class="scan-text">Arahkan ke SKU / Barcode</div>

<canvas id="canvas" style="display:none"></canvas>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="app.js"></script>

<script>

/* =========================
UI CONTROL ONLY (TANPA MERUSAK app.js)
========================= */

const btnCamera = document.getElementById("btnCamera")
const btnClose = document.getElementById("btnClose")
const video = document.getElementById("camera")
const scanFrame = document.getElementById("scanFrame")
const scanText = document.getElementById("scanText")

btnCamera.addEventListener("click", () => {
  video.classList.add("active")
  scanFrame.classList.add("active")
  scanText.classList.add("active")
  btnClose.classList.add("active")
  document.body.classList.add("camera-open")
})

btnClose.addEventListener("click", () => {
  video.classList.remove("active")
  scanFrame.classList.remove("active")
  scanText.classList.remove("active")
  btnClose.classList.remove("active")
  document.body.classList.remove("camera-open")

  // stop kamera jika ada
  if (window.stream) {
    window.stream.getTracks().forEach(t => t.stop())
    window.stream = null
  }
})

</script>

</body>
</html>
