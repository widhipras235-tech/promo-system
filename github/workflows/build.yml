name: Build Promo Database

on:
  push:
    paths:
      - 'excel/**'

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - uses: actions/setup-node@v3
      with:
        node-version: 18

    - run: npm install xlsx

    - run: node build/convert_excel.js

    - name: Commit DB
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add db/*
        git commit -m "auto database build" || echo "no changes"
        git push