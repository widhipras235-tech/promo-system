<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Drive</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f3f4;
}

.header{
  background:#fff;
  padding:15px;
  font-weight:bold;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.container{
  padding:20px;
}

.breadcrumb{
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:pointer;
}

.folder{ font-weight:bold; }

.actions{
  margin-top:10px;
  display:flex;
  justify-content:space-between;
}

button{
  border:none;
  padding:5px;
  border-radius:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">📁 Admin GitHub Drive</div>

<div class="container">

  <div class="breadcrumb" id="path"></div>

  <button onclick="createFolder()">+ Folder</button>
  <button onclick="uploadFile()">Upload File</button>

  <input type="file" id="fileInput" hidden>

  <div class="grid" id="list"></div>

</div>

<script>
const OWNER = "widhipras235-tech"
const REPO = "promo-system"
const TOKEN = "ISI_TOKEN_KAMU_DISINI"

let currentPath = ""

/* =========================
FETCH FILES
========================= */
async function loadFiles(){

  let res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${currentPath}`,{
    headers:{
      Authorization: `token ${TOKEN}`
    }
  })

  let data = await res.json()

  render(data)
  updatePath()

}

/* =========================
RENDER
========================= */
function render(data){

  let html=""

  data.forEach(item=>{

    if(item.type==="dir"){
      html+=`
      <div class="card folder" onclick="openFolder('${item.path}')">
        📁 ${item.name}
      </div>`
    }else{
      html+=`
      <div class="card">
        📄 ${item.name}

        <div class="actions">
          <button onclick="moveFile('${item.path}')">Move</button>
          <button onclick="deleteFile('${item.path}','${item.sha}')">Delete</button>
        </div>
      </div>`
    }

  })

  document.getElementById("list").innerHTML=html

}

/* =========================
NAVIGASI
========================= */
function openFolder(path){
  currentPath = path
  loadFiles()
}

function updatePath(){
  document.getElementById("path").innerText = "/" + currentPath
}

/* =========================
CREATE FOLDER
========================= */
async function createFolder(){

  let name = prompt("Nama folder:")

  if(!name) return

  let path = currentPath + "/" + name + "/.keep"

  await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,{
    method:"PUT",
    headers:{
      Authorization:`token ${TOKEN}`,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      message:"create folder",
      content:btoa("")
    })
  })

  loadFiles()
}

/* =========================
UPLOAD FILE
========================= */
function uploadFile(){
  document.getElementById("fileInput").click()
}

document.getElementById("fileInput").addEventListener("change", async function(e){

  let file = e.target.files[0]
  let reader = new FileReader()

  reader.onload = async function(){

    let content = reader.result.split(",")[1]

    await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${currentPath}/${file.name}`,{
      method:"PUT",
      headers:{
        Authorization:`token ${TOKEN}`
      },
      body: JSON.stringify({
        message:"upload file",
        content:content
      })
    })

    loadFiles()
  }

  reader.readAsDataURL(file)

})

/* =========================
DELETE
========================= */
async function deleteFile(path,sha){

  if(!confirm("Hapus file?")) return

  await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`,{
    method:"DELETE",
    headers:{
      Authorization:`token ${TOKEN}`
    },
    body: JSON.stringify({
      message:"delete file",
      sha:sha
    })
  })

  loadFiles()
}

/* =========================
MOVE FILE
========================= */
async function moveFile(oldPath){

  let newPath = prompt("Pindahkan ke path baru:")

  if(!newPath) return

  // ambil file
  let res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${oldPath}`,{
    headers:{ Authorization:`token ${TOKEN}` }
  })

  let data = await res.json()

  // upload ke lokasi baru
  await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${newPath}`,{
    method:"PUT",
    headers:{ Authorization:`token ${TOKEN}` },
    body: JSON.stringify({
      message:"move file",
      content:data.content
    })
  })

  // hapus lama
  await deleteFile(oldPath, data.sha)

  loadFiles()
}

loadFiles()
</script>

</body>
</html>
